<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" size="small" (click)="voltar()">Voltar</ion-button>
    </ion-buttons>
    <ion-title>Metade sombra</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <!-- LISTA SIMPLES EM LINHA -->
  <div class="audio-row">
    <div
      class="audio-item"
      *ngFor="let audio of audios"
      (click)="selecionarAudio(audio)"
    >
      {{ audio.nome }}
    </div>
  </div>

  <!-- TUA GRID NORMAL -->
  <ion-grid>
    <ion-row>
      <ion-col size="6">
        <ion-card button (click)="abrirLinguagemCorpoDetalhe()">
          <ion-card-header>
            <ion-card-title>Linguagem do corpo</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card button (click)="abrirATuaCasa()">
          <ion-card-header>
            <ion-card-title>A tua casa</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="6">
        <ion-card button (click)="abrirOQueComes()">
          <ion-card-header>
            <ion-card-title>O que comes</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card button (click)="abrirOQueVes()">
          <ion-card-header>
            <ion-card-title>O que vês</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="6">
        <ion-card button (click)="abrirOQueUsas()">
          <ion-card-header>
            <ion-card-title>O que usas</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>

      <ion-col size="6"></ion-col>
    </ion-row>
  </ion-grid>

</ion-content>

<!-- PLAYER SIMPLES -->
<div class="player" *ngIf="audioSelecionado">
  <div class="title">
    {{ audioSelecionado.nome }}
  </div>

  <audio controls autoplay>
    <source [src]="audioSelecionado.src" type="audio/mp4" />
  </audio>

  <ion-button size="small" color="danger" (click)="parar()">
    Parar
  </ion-button>
</div>
